<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EduDisha | The Cognitive Sanctuary for Students</title>
    <!-- Custom Theme Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <!-- PDF Generation Hub (Zero-Install Integration) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='25' fill='%230057bd'/><path d='M50 20 L80 80 L50 65 L20 80 Z' fill='white'/></svg>"/>
    <!-- Professional Preloader Style (Phase 1) -->
    <style>
      #preloader {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #f4f7f9;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out, visibility 0.5s;
      }
      .loader-ring {
        width: 64px; height: 64px;
        border: 4px solid #e0e7ff;
        border-top: 4px solid #005da7;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .loader-text {
        margin-top: 24px;
        font-family: 'Plus Jakarta Sans', sans-serif;
        font-weight: 700;
        color: #005da7;
        letter-spacing: -0.02em;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.98); } }
      .preloader-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    </style>
  </head>
  <body>
    <!-- Global Preloader Hub -->
    <div id="preloader">
      <div class="loader-ring"></div>
      <div class="loader-text">EduDisha</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
